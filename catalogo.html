<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Catálogo Online - Disponibilidade</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .item-image { width: 100%; height: 250px; object-fit: contain; border-radius: 20px; background: #f8fafc; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; font-size: 10px; }
        .day { padding: 5px 0; text-align: center; border-radius: 6px; border: 1px solid #eee; height: 30px; display: flex; align-items: center; justify-content: center; }
        .day-rented { background-color: #ef4444 !important; color: white !important; font-weight: bold; }
        .day-free { background-color: #f0fdf4; color: #16a34a; }
        .day-empty { border: none; background: transparent; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen pb-10 font-sans text-slate-900">

    <header class="bg-white shadow-sm p-6 sticky top-0 z-50 border-b text-center">
        <h1 class="text-orange-600 font-black text-2xl italic uppercase">Catálogo de Disponibilidade</h1>
        <p class="text-slate-400 text-[10px] font-bold uppercase tracking-widest mt-1">Consulte modelos e datas</p>
    </header>

    <main class="max-w-4xl mx-auto p-4">
        
        <div id="areaCarregamento" class="bg-white p-6 rounded-[32px] shadow-xl border-2 border-orange-100 mb-8 text-center">
            <h2 class="font-black text-sm uppercase mb-4">Atualizar Informações</h2>
            <button onclick="carregarCatalogoAutomatico()" id="btnSync" class="w-full bg-orange-600 text-white p-5 rounded-2xl font-black uppercase italic shadow-lg hover:scale-[1.02] transition-transform flex items-center justify-center gap-3">
                <span>🔄</span> VER MODELOS E DATAS AGORA
            </button>
            
            <div class="mt-6 pt-4 border-t border-dashed">
                <p class="text-[9px] text-slate-400 font-bold uppercase mb-2">Ou se preferir, abra o arquivo enviado pela loja:</p>
                <input type="file" id="inputArquivo" accept=".json" class="text-[10px] text-slate-500 file:bg-slate-100 file:border-0 file:rounded-full file:px-4 file:py-2 file:font-bold">
            </div>
        </div>

        <div id="filtros" class="hidden mb-6 flex gap-2 overflow-x-auto pb-2">
            <select id="filtroCategoria" onchange="aplicarFiltros()" class="bg-white border-2 border-slate-200 p-3 rounded-xl font-bold text-xs outline-none focus:border-orange-500"></select>
            <div class="flex items-center bg-white border-2 border-slate-200 rounded-xl px-3 gap-2">
                <select id="filtroMes" onchange="aplicarFiltros()" class="font-bold text-xs uppercase bg-transparent outline-none"></select>
                <span id="labelAno" class="font-black text-xs text-orange-600">2024</span>
            </div>
        </div>

        <div id="listaItens" class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="col-span-full text-center py-20 text-slate-300">
                <p class="font-bold italic">Clique no botão acima para carregar o catálogo...</p>
            </div>
        </div>
    </main>

    <script>
        let dadosOriginais = [];
const dataHoje = new Date();
const anoAtual = dataHoje.getFullYear();

// Configuração Inicial
document.addEventListener("DOMContentLoaded", () => {
    const campoAno = document.getElementById('labelAno');
    if (campoAno) campoAno.innerText = anoAtual;
    popularMeses();
});

function popularMeses() {
    const meses = ["Janeiro", "Fevereiro", "Março", "Abril", "Maio", "Junho", "Julho", "Agosto", "Setembro", "Outubro", "Novembro", "Dezembro"];
    const select = document.getElementById('filtroMes');
    if (!select) return;
    
    select.innerHTML = '';
    meses.forEach((m, i) => {
        const opt = document.createElement('option');
        opt.value = i;
        opt.innerText = m;
        if (i === dataHoje.getMonth()) opt.selected = true;
        select.appendChild(opt);
    });
}

async function carregarCatalogoAutomatico() {
    const btn = document.getElementById('btnSync');
    const originalText = btn.innerText;
    btn.innerText = "⏳ CONECTANDO...";
    btn.disabled = true;

    // Substitua SEU_USUARIO pelo seu nome de usuário real do GitHub
    const usuario = "lucasborgescamargo1994-blip"; 
    const timestamp = new Date().getTime();
    const url = `https://raw.githubusercontent.com/${usuario}/controleempresas/main/catalogo_online.json?t=${timestamp}`;

    try {
        const resposta = await fetch(url, { 
            mode: 'cors',
            cache: 'no-store' 
        });
        
        if (!resposta.ok) throw new Error(`Erro HTTP: ${resposta.status}`);
        
        const dados = await resposta.json();
        processarDados(dados);
        document.getElementById('areaCarregamento').classList.add('hidden');
        
    } catch (err) {
        console.error("ERRO:", err);
        alert("Erro ao sincronizar. Verifique se o arquivo existe no GitHub.");
        btn.innerText = originalText;
        btn.disabled = false;
    }
}

// Suporte para carregar arquivo localmente se precisar
document.getElementById('inputArquivo').addEventListener('change', function(e) {
    const leitor = new FileReader();
    leitor.onload = (event) => {
        const dados = JSON.parse(event.target.result);
        processarDados(dados);
        document.getElementById('areaCarregamento').classList.add('hidden');
    };
    leitor.readAsText(e.target.files[0]);
});

function processarDados(dados) {
    dadosOriginais = dados;
    document.getElementById('filtros').classList.remove('hidden');
    
    const categorias = [...new Set(dados.map(d => d.categoria))];
    const selCat = document.getElementById('filtroCategoria');
    selCat.innerHTML = `<option value="TODAS">TODAS AS CATEGORIAS</option>` + 
                       categorias.map(c => `<option value="${c}">${c}</option>`).join('');
    
    aplicarFiltros();
}

function aplicarFiltros() {
    const cat = document.getElementById('filtroCategoria').value;
    const mes = document.getElementById('filtroMes').value;
    renderizarEstoque(dadosOriginais.filter(d => cat === "TODAS" || d.categoria === cat), mes, anoAtual);
}

function renderizarEstoque(itens, mes, ano) {
    const container = document.getElementById('listaItens');
    container.innerHTML = '';

    itens.forEach(item => {
        const card = document.createElement('div');
        card.className = "bg-white rounded-[32px] shadow-md border p-4 flex flex-col";
        card.innerHTML = `
            <img src="${item.foto}" class="item-image mb-4 shadow-inner" onerror="this.src='https://placehold.co/400x300?text=Sem+Foto'">
            <div class="text-center mb-4">
                <span class="text-[10px] font-black text-orange-500 uppercase tracking-tighter">[${item.ref}]</span>
                <h3 class="font-black text-sm uppercase italic">${item.nome}</h3>
            </div>
            <div class="bg-slate-50 p-3 rounded-2xl border">
                <div class="grid grid-cols-7 text-[8px] font-black text-slate-400 text-center mb-1">
                    <div>D</div><div>S</div><div>T</div><div>Q</div><div>Q</div><div>S</div><div>S</div>
                </div>
                <div class="calendar-grid">
                    ${gerarCalendarioHtml(item.alugueis, mes, ano)}
                </div>
            </div>
        `;
        container.appendChild(card);
    });
}

function gerarCalendarioHtml(alugueis, mes, ano) {
    const totalDias = new Date(ano, parseInt(mes) + 1, 0).getDate();
    const primeiroDia = new Date(ano, mes, 1).getDay();
    let html = '';

    // 1. Espaços vazios para alinhar o dia da semana
    for (let i = 0; i < primeiroDia; i++) html += `<div class="day day-empty"></div>`;

    // 2. Garantir que 'alugueis' seja sempre um array para evitar o erro de 'undefined'
    const listaAlugueis = alugueis || [];

    for (let dia = 1; dia <= totalDias; dia++) {
        // Formata o dia atual do calendário (Ex: 2026-03-17)
        const dataCalendario = `${ano}-${String(parseInt(mes) + 1).padStart(2, '0')}-${String(dia).padStart(2, '0')}`;

        // 3. Verificação segura de ocupação
        const ocupado = listaAlugueis.some(al => {
            // Se as datas de início ou fim estiverem faltando neste registro, ignora
            if (!al.inicio || !al.fim) return false;

            // Limpa as datas de possíveis espaços em branco
            const inicio = al.inicio.trim();
            const fim = al.fim.trim();

            return dataCalendario >= inicio && dataCalendario <= fim;
        });

        html += `<div class="day ${ocupado ? 'day-rented' : 'day-free'}">${dia}</div>`;
    }
    return html;
}
    </script>
</body>
</html>
