<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Borges & Camargo - Gestão de aluguéis</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    
    <style>
        .hidden { display: none; }
        .item-image { width: 100%; height: 200px; object-fit: contain; border-radius: 16px; background: #f8fafc; border: 1px solid #f1f5f9; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; font-size: 9px; }
        .calendar-header { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; text-align: center; font-weight: 800; font-size: 8px; color: #94a3b8; margin-bottom: 2px; }
        .day { padding: 4px 0; text-align: center; border-radius: 4px; border: 1px solid #eee; height: 24px; display: flex; align-items: center; justify-content: center; }
        .day-rented { background-color: #ef4444 !important; color: white !important; font-weight: bold; border-color: #b91c1c; }
        .day-free { background-color: #f0fdf4; color: #16a34a; }
        .day-empty { border: none; background: transparent; }
        #secaoImpressao { position: absolute; left: -9999px; top: 0; background: white; }
        @media print { .no-print { display: none; } }
    </style>
</head>
<body class="bg-slate-50 min-h-screen pb-24 font-sans text-slate-900">

    <div id="secaoImpressao"></div>

    <div id="telaSetup" class="hidden fixed inset-0 bg-orange-600 z-[1000] flex items-center justify-center p-4 overflow-y-auto">
        <div class="bg-white p-6 rounded-[40px] shadow-2xl w-full max-w-lg border-4 border-slate-900 my-auto">
            <h2 class="text-2xl font-black mb-6 uppercase text-orange-600 text-center italic">Configuração Inicial</h2>
            <div class="space-y-3">
                <div><label class="text-[10px] font-bold uppercase ml-2">Nome / Empresa *</label><input type="text" id="setupNome" class="w-full border-2 p-3 rounded-2xl font-bold outline-none border-slate-200 focus:border-orange-500"></div>
                <div class="grid grid-cols-2 gap-3">
                    <div><label class="text-[10px] font-bold uppercase ml-2">CPF / CNPJ</label><input type="text" id="setupDoc" class="w-full border-2 p-3 rounded-2xl font-bold outline-none border-slate-200 focus:border-orange-500"></div>
                    <div><label class="text-[10px] font-bold uppercase ml-2">Telefone</label><input type="text" id="setupTel" placeholder="(00) 00000-0000" class="w-full border-2 p-3 rounded-2xl font-bold outline-none border-slate-200 focus:border-orange-500"></div>
                </div>
                <div><label class="text-[10px] font-bold uppercase ml-2">Endereço Completo</label><textarea id="setupEnd" class="w-full border-2 p-3 rounded-2xl font-bold outline-none h-20 border-slate-200 focus:border-orange-500"></textarea></div>
                <div class="bg-orange-50 p-3 rounded-2xl border-2 border-dashed border-orange-200"><label class="text-[10px] font-bold uppercase block text-center mb-2">Logo Empresa (Opcional)</label><input type="file" id="setupLogo" accept="image/*" class="text-[10px] w-full"></div>
                <button onclick="finalizarSetupCompleto()" class="w-full bg-slate-900 text-white p-5 rounded-2xl font-black uppercase mt-4 hover:bg-orange-600 transition-colors">Ativar Sistema</button>
            </div>
        </div>
    </div>

    <div id="modalFiltroCatalogo" class="hidden fixed inset-0 bg-black/80 z-[200] flex items-center justify-center p-4">
        <div class="bg-white p-6 rounded-[30px] w-full max-w-sm shadow-2xl">
            <h3 class="font-black text-center text-orange-600 uppercase italic mb-4">Exportar Catálogo</h3>
            <label class="text-[10px] font-black uppercase ml-1">Filtrar por Categoria:</label>
            <select id="selectCatExport" class="w-full border-2 p-4 rounded-2xl font-bold mt-1 mb-6 outline-none border-slate-100 focus:border-orange-500">
                <option value="TUDO">MOSTRAR TODAS</option>
            </select>
            <div class="flex flex-col gap-2">
                <button onclick="processarGerarCatalogo()" class="w-full bg-green-600 text-white p-4 rounded-2xl font-black uppercase italic">Baixar PDF</button>
                <button onclick="document.getElementById('modalFiltroCatalogo').classList.add('hidden')" class="w-full bg-slate-100 text-slate-500 p-3 rounded-2xl font-bold uppercase text-[10px]">Cancelar</button>
            </div>
        </div>
    </div>

    <header class="bg-white shadow-sm p-4 flex flex-wrap justify-between items-center sticky top-0 z-50 border-b gap-4 no-print">
    <div class="flex items-center gap-4">
        <h1 id="headerNomeLoja" class="text-orange-600 font-black text-xl italic uppercase">Folia & Gestão</h1>
        
        <div class="relative min-w-[300px]">
            <input type="text" id="buscaGlobal" onkeyup="renderizarEstoque()" 
                   placeholder="Pesquisar código, peça ou cliente..." 
                   class="w-full p-2 pl-4 pr-10 rounded-full border-2 border-slate-100 font-medium text-xs outline-none focus:border-orange-500 bg-slate-50 transition-all">
            <button onclick="document.getElementById('buscaGlobal').value=''; renderizarEstoque()" class="absolute right-3 top-2 text-slate-400 hover:text-orange-500">✕</button>
        </div>
    </div>

    <div class="flex items-center gap-4">
        <div class="flex items-center bg-slate-100 p-1 rounded-full border shadow-inner">
            <select id="filtroMes" onchange="renderizarEstoque()" class="bg-transparent font-black uppercase text-[10px] px-3 outline-none cursor-pointer">
                <option value="0">Janeiro</option><option value="1">Fevereiro</option><option value="2">Março</option>
                <option value="3">Abril</option><option value="4">Maio</option><option value="5">Junho</option>
                <option value="6">Julho</option><option value="7">Agosto</option><option value="8">Setembro</option>
                <option value="9">Outubro</option><option value="10">Novembro</option><option value="11">Dezembro</option>
            </select>
            <input type="number" id="filtroAno" onchange="renderizarEstoque()" class="bg-transparent font-black text-[10px] w-16 outline-none text-center">
        </div>
        <div class="flex gap-2">
            <button onclick="abrirModalFiltroCatalogo()" class="bg-green-600 text-white p-2 px-4 rounded-full font-bold text-[10px] uppercase italic">Catálogo PDF</button>
            <button onclick="abrirModal()" class="bg-slate-900 text-white p-2 px-4 rounded-full font-bold text-[10px] uppercase italic">Painel ADM</button>
        </div>
    </div>
</header>
	
    <main class="max-w-7xl mx-auto p-4 grid lg:grid-cols-4 gap-6 no-print">
	
        <aside class="lg:col-span-1">
            <div class="bg-white p-5 rounded-3xl shadow-xl border sticky top-24">
                <h3 class="font-black mb-4 uppercase text-sm italic border-b pb-2 text-orange-600">Nova Peça</h3>
                <form id="formFantasia" class="space-y-3">
                    <input type="text" id="refPeca" placeholder="Referência" required class="w-full border p-3 rounded-xl font-bold text-sm bg-slate-50 outline-none focus:border-orange-500">
                    <input type="text" id="nomePeca" placeholder="Nome da Peça" autocomplete="off" onkeyup="sugerirNomesItem(this)" required class="w-full border p-3 rounded-xl font-bold text-sm bg-slate-50 outline-none focus:border-orange-500">
                    <div id="sugestaoItem" class="absolute bg-white shadow-2xl z-[60] w-full left-0 hidden border rounded-xl max-h-40 overflow-y-auto"></div>
                    <select id="catPeca" required class="w-full border p-3 rounded-xl text-sm font-bold bg-slate-50 outline-none">
    <option value="" disabled selected>Selecionar categoria</option>
</select>
                    <input type="file" id="fotoPeca" accept="image/*" class="text-[10px] w-full">
                    <button type="submit" class="w-full bg-green-600 text-white p-4 rounded-xl font-black uppercase text-xs">Salvar Peça</button>
                </form>
            </div>
			

    <div class="grid lg:grid-cols-4 gap-6">
        </aside>
        <section id="listaEstoque" class="lg:col-span-3 space-y-4"></section>
    </main>

    <div id="modalConfig" class="hidden fixed inset-0 bg-black/60 z-[100] flex items-center justify-center p-2 no-print">
        <div class="bg-white w-full max-w-5xl rounded-3xl p-6 shadow-2xl max-h-[95vh] overflow-y-auto">
            <div class="flex border-b mb-6 gap-2 overflow-x-auto pb-2">
                <button onclick="tab('empresa')" id="btnTabEmpresa" class="tab-btn px-4 py-2 font-black uppercase text-[10px] border-b-2 border-orange-500 text-orange-600">Empresa</button>
                <button onclick="tab('categorias')" id="btnTabCategorias" class="tab-btn px-4 py-2 font-black uppercase text-[10px] border-b-2 border-transparent text-slate-400">Categorias</button>
                <button onclick="tab('clientes')" id="btnTabClientes" class="tab-btn px-4 py-2 font-black uppercase text-[10px] border-b-2 border-transparent text-slate-400">Clientes</button>
                <button onclick="tab('banco')" id="btnTabBanco" class="tab-btn px-4 py-2 font-black uppercase text-[10px] border-b-2 border-transparent text-slate-400">Backup</button>
            </div>

            <div id="tab_empresa" class="aba-content space-y-4">
                <div class="grid md:grid-cols-2 gap-4">
                    <div class="space-y-1"><label class="text-[9px] font-bold">LOGO</label><input type="file" id="regLogo" class="w-full border p-2 rounded-xl text-xs"></div>
                    <input type="text" id="regNome" placeholder="Nome da Loja" class="w-full border p-3 rounded-xl font-bold mt-4">
                </div>
                <div class="grid md:grid-cols-2 gap-4">
                    <input type="text" id="regDoc" placeholder="CPF/CNPJ" class="w-full border p-3 rounded-xl font-bold">
                    <input type="text" id="regTel" placeholder="WhatsApp" class="w-full border p-3 rounded-xl font-bold">
                </div>
                <textarea id="regEnd" placeholder="Endereço" class="w-full border p-3 rounded-xl h-20 font-bold"></textarea>
                <button onclick="salvarLoja()" class="w-full bg-orange-600 text-white p-4 rounded-xl font-black uppercase italic">Atualizar Dados</button>
            </div>

            <div id="tab_categorias" class="aba-content hidden space-y-4">
                <div class="bg-slate-50 p-4 rounded-2xl flex gap-2">
                    <input type="text" id="novaCatInput" placeholder="NOVA CATEGORIA" class="flex-1 border p-3 rounded-xl font-bold uppercase">
                    <button onclick="addCategoriaPainel()" class="bg-green-600 text-white px-6 rounded-xl font-black italic">+</button>
                </div>
                <div id="listaCategoriasPainel" class="grid grid-cols-2 md:grid-cols-4 gap-2"></div>
            </div>

            <div id="tab_clientes" class="aba-content hidden space-y-4">
                <div class="bg-orange-50 p-3 rounded-2xl border border-orange-200"><input type="text" id="filtroNomeCliente" onkeyup="listarClientes()" placeholder="🔍 Pesquisar cliente..." class="w-full p-3 rounded-xl border font-bold uppercase text-sm outline-none focus:border-orange-500"></div>
                <div class="overflow-x-auto border rounded-2xl">
                    <table class="w-full text-left text-[10px]">
                        <thead class="bg-slate-50"><tr><th class="p-3">Nome</th><th class="p-3">Doc</th><th class="p-3">Contato</th><th class="p-3">Endereço</th><th class="p-3">Ação</th></tr></thead>
                        <tbody id="corpoClientes"></tbody>
                    </table>
                </div>
            </div>

            <div id="tab_banco" class="aba-content hidden space-y-4 text-center py-6">
                <button onclick="exportarDados()" class="w-full bg-blue-600 text-white p-4 rounded-xl font-black italic">EXPORTAR BACKUP</button>
                <input type="file" id="importFile" class="hidden" onchange="importarDados(this)">
                <button onclick="document.getElementById('importFile').click()" class="w-full bg-indigo-600 text-white p-4 rounded-xl font-black italic">IMPORTAR BACKUP</button>
                <button onclick="apagarTudo()" class="w-full bg-red-100 text-red-600 p-4 rounded-xl font-black mt-10">ZERAR SISTEMA</button>
            </div>
            <button onclick="fecharModal()" class="w-full mt-8 bg-slate-900 text-white p-4 rounded-xl font-black uppercase italic">Sair do Painel</button>
        </div>
    </div>

    <script>
        let db;
        let categorias = JSON.parse(localStorage.getItem('cats')) || ["GERAL"];
        let catsAbertas = JSON.parse(localStorage.getItem('catsAbertas')) || {}; 
        let dadosLoja = JSON.parse(localStorage.getItem('dadosLoja')) || null;
        const dataHoje = new Date();

        document.addEventListener("DOMContentLoaded", () => {
            document.getElementById('filtroMes').value = dataHoje.getMonth();
            document.getElementById('filtroAno').value = dataHoje.getFullYear();
        });

        const request = indexedDB.open("FoliaGestao_MASTER_DB", 1);
        request.onupgradeneeded = (e) => {
            db = e.target.result;
            db.createObjectStore("fantasias", { keyPath: "id" });
            db.createObjectStore("clientes", { keyPath: "id" });
        };

        request.onsuccess = (e) => { 
            db = e.target.result; 
            if(!dadosLoja) document.getElementById('telaSetup').classList.remove('hidden');
            else { renderizarEstoque(); updateSelects(); preencherCamposConfig(); }
        };

        function getDiasNoMes(mes, ano) { return new Date(ano, parseInt(mes) + 1, 0).getDate(); }
        function getPrimeiroDiaSemana(mes, ano) { return new Date(ano, mes, 1).getDay(); }

        // --- CALENDÁRIO COM ALINHAMENTO FIXO PARA PDF ---
        function gerarCalendarioHtml(alugueis, mes, ano, isPdf = false) {
            const totalDias = getDiasNoMes(mes, ano);
            const primeiroDia = getPrimeiroDiaSemana(mes, ano);
            let html = '';
            
            // Estilos fixos para o PDF não quebrar alinhamento
            const cellStyle = isPdf 
                ? 'width: 26px; height: 18px; line-height: 18px; text-align: center; font-size: 8px; border-radius: 3px; display: inline-block; margin: 1px;' 
                : '';
            const styleFree = isPdf ? 'background-color: #f0fdf4; color: #16a34a; border: 1px solid #dcfce7;' : '';
            const styleRented = isPdf ? 'background-color: #fee2e2; color: #b91c1c; border: 1px solid #fecaca; font-weight: bold;' : '';

            // Dias vazios (antes do dia 1)
            for (let i = 0; i < primeiroDia; i++) {
                if(isPdf) html += `<div style="${cellStyle}"></div>`;
                else html += `<div class="day day-empty"></div>`;
            }

            // Dias do mês
            for (let dia = 1; dia <= totalDias; dia++) {
                const dataStr = `${ano}-${String(parseInt(mes)+1).padStart(2,'0')}-${String(dia).padStart(2,'0')}`;
                let ocupado = alugueis.some(al => dataStr >= al.ret && dataStr <= al.dev);
                
                if(isPdf) {
                    html += `<div style="${cellStyle} ${ocupado ? styleRented : styleFree}">${dia}</div>`;
                } else {
                    html += `<div class="day ${ocupado ? 'day-rented' : 'day-free'}">${dia}</div>`;
                }
            }
            return html;
        }

        function renderizarEstoque() {
    const container = document.getElementById('listaEstoque');
    const mesSel = document.getElementById('filtroMes').value;
    const anoSel = document.getElementById('filtroAno').value;
    const termoBusca = document.getElementById('buscaGlobal')?.value.toLowerCase() || "";

    if(!db) return;

    db.transaction("fantasias").objectStore("fantasias").getAll().onsuccess = (e) => {
        let todas = e.target.result;
        
        // Aplica o filtro global
        if (termoBusca) {
            todas = todas.filter(f => {
                const nomePeca = f.nome.toLowerCase();
                const refPeca = f.ref.toLowerCase();
                // Verifica se algum cliente no histórico de aluguéis coincide com a busca
                const clienteAluguel = f.alugueis.some(al => al.nome.toLowerCase().includes(termoBusca));
                
                return nomePeca.includes(termoBusca) || refPeca.includes(termoBusca) || clienteAluguel;
            });
        }

        container.innerHTML = '';
        
        // Se a busca não retornar nada
        if (todas.length === 0 && termoBusca) {
            container.innerHTML = '<div class="text-center p-10 font-bold text-slate-400">Nenhuma peça ou cliente encontrado para esta busca.</div>';
            return;
        }

        categorias.sort().forEach(cat => {
            const pecas = todas.filter(f => f.categoria === cat);
            if (pecas.length === 0) return; // Não mostra categoria vazia durante a busca

            const aberta = termoBusca ? true : (catsAbertas[cat] || false);
            const section = document.createElement('div');
            section.className = "bg-white rounded-[32px] shadow-sm border mb-4 overflow-hidden";
            section.innerHTML = `
                <div onclick="toggleCat('${cat}')" class="bg-slate-800 p-4 flex justify-between items-center cursor-pointer text-white font-black text-xs uppercase italic">
                    <span>${cat} (${pecas.length})</span><span>${aberta ? '▲' : '▼'}</span>
                </div>
                <div id="content_${cat.replace(/\s+/g, '')}" class="${aberta ? '' : 'hidden'} p-3 grid grid-cols-1 md:grid-cols-2 gap-4 bg-slate-50"></div>
            `;
            
            const grid = section.querySelector(`#content_${cat.replace(/\s+/g, '')}`);
            pecas.forEach(f => {
                const card = document.createElement('div');
                card.className = "bg-white rounded-[24px] shadow-sm border p-4";
                // ... (O restante do código do card permanece exatamente o mesmo que você já tem)
                card.innerHTML = `
                    <img src="${f.foto || ''}" class="item-image mb-3">
                    <div class="calendar-header"><div>D</div><div>S</div><div>T</div><div>Q</div><div>Q</div><div>S</div><div>S</div></div>
                    <div class="calendar-grid bg-slate-50 p-1 rounded-xl border mb-3">${gerarCalendarioHtml(f.alugueis, mesSel, anoSel)}</div>
                    <h4 class="font-black text-[12px] uppercase text-center text-orange-500 mb-3">[${f.ref || '---'}] ${f.nome}</h4>
                    <div class="bg-orange-50 p-3 rounded-2xl border space-y-2 relative">
                        <input type="text" id="cli_${f.id}" data-id="${f.id}" onkeyup="buscarCliente(this)" placeholder="Nome do Cliente" class="w-full p-2 text-sm rounded-lg border font-bold uppercase">
                        <div id="sugestao_${f.id}" class="absolute bg-white shadow-2xl z-[50] w-full left-0 hidden border rounded-b-xl overflow-hidden"></div>
                        <div class="grid grid-cols-2 gap-1"><input type="text" id="cpf_${f.id}" placeholder="CPF" class="p-1 text-xs border rounded"><input type="text" id="tel_${f.id}" placeholder="WhatsApp" class="p-1 text-xs border rounded"></div>
                        <input type="text" id="end_${f.id}" placeholder="Endereço" class="w-full p-1 text-xs border rounded uppercase">
                        <input type="text" id="val_${f.id}" placeholder="Valor R$" class="w-full p-1 text-xs border rounded">
                        <div class="grid grid-cols-3 gap-1 text-[8px] font-bold">
                            <div>RETIRADA<input type="date" id="ret_${f.id}" class="w-full p-1 border rounded"></div>
                            <div class="text-orange-600">USO<input type="date" id="uso_${f.id}" class="w-full p-1 border rounded"></div>
                            <div>DEVOLUÇÃO<input type="date" id="dev_${f.id}" class="w-full p-1 border rounded"></div>
                        </div>
                        <button onclick="registrarAluguel(${f.id})" class="w-full bg-orange-500 text-white p-3 rounded-xl text-xs font-black uppercase">Agendar</button>
                        <button onclick="excluirPeca(${f.id})" class="w-full text-[8px] mt-1 font-bold text-red-800">ELIMINAR PEÇA</button>
                    </div>
                    <div class="mt-2 space-y-1">${f.alugueis.map(al => `
                        <div class="bg-white p-2 rounded border flex justify-between items-center text-[9px] ${al.nome.toLowerCase().includes(termoBusca) && termoBusca ? 'ring-2 ring-orange-500' : ''}">
                            <span class="font-bold uppercase">${al.nome}</span>
                            <div class="flex gap-1">
                                <button onclick='gerarContratoPdf("${f.nome}", "${f.ref}", ${JSON.stringify(al)})' class="bg-blue-600 text-white px-2 py-1 rounded font-bold">PDF</button>
                                <a href="https://wa.me/55${(al.tel||'').replace(/\D/g,'')}" target="_blank" class="bg-green-600 text-white px-2 py-1 rounded font-bold italic">WHATS</a>
                                <button onclick="excluirAluguel(${f.id}, ${al.idAluguel})" class="text-red-500 font-black px-1">✕</button>
                            </div>
                        </div>`).join('')}</div>
                `;
                grid.appendChild(card);
            });
            container.appendChild(section);
        });
    };
}

        // --- GERAÇÃO DE PDF E DOWNLOAD ---

        async function exportarElementoParaPdf(elemento, nomeArquivo) {
            const { jsPDF } = window.jspdf;
            const canvas = await html2canvas(elemento, { scale: 2, useCORS: true, backgroundColor: "#ffffff" });
            const imgData = canvas.toDataURL('image/jpeg', 0.20);
            const pdf = new jsPDF('p', 'mm', 'a4');
            const pdfWidth = pdf.internal.pageSize.getWidth();
            const pdfHeight = pdf.internal.pageSize.getHeight();
            const imgWidth = pdfWidth;
            const imgHeight = (canvas.height * imgWidth) / canvas.width;
            
            let heightLeft = imgHeight;
            let position = 0;
            pdf.addImage(imgData, 'JPEG', 0, position, imgWidth, imgHeight);
            heightLeft -= pdfHeight;

            while (heightLeft >= 0) {
                position = heightLeft - imgHeight;
                pdf.addPage();
                pdf.addImage(imgData, 'JPEG', 0, position, imgWidth, imgHeight);
                heightLeft -= pdfHeight;
            }
            pdf.save(`${nomeArquivo}.pdf`);
            document.getElementById('secaoImpressao').innerHTML = '';
        }

        async function gerarContratoPdf(n, r, al) {
            const area = document.getElementById('secaoImpressao');
            const fmt = (d) => d ? d.split('-').reverse().join('/') : '--/--/--';
            area.innerHTML = `
            <div id="contrato-pdf" style="width: 750px; padding: 40px; background: white; color: black !important; font-family: Arial, sans-serif;">
                <div style="display: flex; align-items: center; border-bottom: 3px solid #000; padding-bottom: 15px; margin-bottom: 20px;">
                    <div style="width: 150px; height: 100px; display: flex; align-items: center; justify-content: center;">
                        ${dadosLoja.logo ? `<img src="${dadosLoja.logo}" style="max-width: 150px; max-height: 100px; object-fit: contain;">` : ''}
                    </div>
                    <div style="flex: 1; text-align: center; padding-left: 20px;">
                        <h2 style="font-size: 24px; font-weight: 900; margin: 0; text-transform: uppercase;">${dadosLoja.nome}</h2>
                        <p style="font-size: 13px; margin: 5px 0;">DOC: ${dadosLoja.doc || '---'} | TEL: ${dadosLoja.tel || '---'}</p>
                        <p style="font-size: 11px; margin: 0;">${dadosLoja.end || '---'}</p>
                    </div>
                </div>
                <h3 style="text-align: center; background: #000; color: #fff; padding: 10px; font-size: 18px; text-transform: uppercase; margin-bottom: 25px;">Contrato de Locação</h3>
                <div style="margin-bottom: 25px; font-size: 14px; line-height: 1.6; border: 1px solid #eee; padding: 15px; border-radius: 10px;">
                    <div><b>LOCATÁRIO:</b> <span style="text-transform: uppercase;">${al.nome}</span></div>

		async function uploadPdfAoGithub(pdfBlob) {
    const GITHUB_TOKEN = ; // Cole seu token aqui
    const REPO_OWNER = lucasborgescamargo1994-blip;
    const REPO_NAME = controleempresas;
    const FILE_PATH = 'catalogo.pdf'; // Nome do arquivo no site
    
    // 1. Converter Blob para Base64
    const reader = new FileReader();
    reader.readAsDataURL(pdfBlob);
    reader.onloadend = async () => {
        const base64Content = reader.result.split(',')[1];

        // 2. Pegar o "SHA" do arquivo atual (necessário para o GitHub aceitar a substituição)
        let sha = "";
        try {
            const res = await fetch(`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${FILE_PATH}`, {
                headers: { 'Authorization': `token ${GITHUB_TOKEN}` }
            });
            const data = await res.json();
            sha = data.sha;
        } catch (e) { console.log("Arquivo novo, sem SHA antigo."); }

        // 3. Fazer o Upload/Update
        const response = await fetch(`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${FILE_PATH}`, {
            method: 'PUT',
            headers: {
                'Authorization': `token ${GITHUB_TOKEN}`,
                'Content-Type': 'application/json',
            },
            body: JSON.stringify({
                message: "Atualizando catálogo via sistema",
                content: base64Content,
                sha: sha // Se o arquivo já existe, o SHA diz ao GitHub para substituir
            })
        });

        if (response.ok) {
            alert("Catálogo Online Atualizado com Sucesso!");
        } else {
            alert("Erro ao atualizar catálogo online.");
        }
    };
}

        function registrarAluguel(pecaId) {
            const al = { 
                idAluguel: Date.now(), 
                nome: document.getElementById(`cli_${pecaId}`).value,
                cpf: document.getElementById(`cpf_${pecaId}`).value,
                tel: document.getElementById(`tel_${pecaId}`).value,
                end: document.getElementById(`end_${pecaId}`).value,
                valor: document.getElementById(`val_${pecaId}`).value,
                ret: document.getElementById(`ret_${pecaId}`).value, 
                uso: document.getElementById(`uso_${pecaId}`).value, 
                dev: document.getElementById(`dev_${pecaId}`).value 
            };
            if(!al.nome || !al.ret || !al.dev) return alert("Nome e datas obrigatórios!");
            const tx = db.transaction("fantasias", "readwrite");
            const s = tx.objectStore("fantasias");
            s.get(pecaId).onsuccess = (e) => {
                const p = e.target.result;
                if(p.alugueis.some(ex => (al.ret <= ex.dev && al.dev >= ex.ret))) return alert("Indisponível!");
                p.alugueis.push(al);
                s.put(p).onsuccess = () => {
                    db.transaction("clientes", "readwrite").objectStore("clientes").put({ id: al.nome.toLowerCase(), nome: al.nome, cpf: al.cpf, tel: al.tel, end: al.end });
                    renderizarEstoque();
                };
            };
        }

            db.transaction("clientes").objectStore("clientes").getAll().onsuccess = (e) => {

        function exportarDados() { 
            db.transaction("fantasias").objectStore("fantasias").getAll().onsuccess = e1 => {

                    const b = { fantasias: e1.target.result, clientes: e2.target.result, categorias, loja: dadosLoja };

                };
            };

        function importarDados(input) {
            const r = new FileReader(); r.onload = (e) => {
                const d = JSON.parse(e.target.result);
                if(d.loja) localStorage.setItem('dadosLoja', JSON.stringify(d.loja));
                const tx1 = db.transaction("fantasias", "readwrite"); d.fantasias.forEach(f => tx1.objectStore("fantasias").put(f));
                const tx2 = db.transaction("clientes", "readwrite"); d.clientes.forEach(c => tx2.objectStore("clientes").put(c));
                alert("Restaurado!"); location.reload();
            }; r.readAsText(input.files[0]);
        }

        document.getElementById('formFantasia').onsubmit = async (e) => {
    e.preventDefault();
    
    const refInformada = document.getElementById('refPeca').value.trim().toUpperCase();
    const categoriaSelecionada = document.getElementById('catPeca').value;
    
    // Validação de categoria (ajuste anterior)
    if (!categoriaSelecionada) {
        alert("Por favor, selecione uma categoria antes de salvar!");
        return;
    }

    // NOVA VALIDAÇÃO: Verificar se a referência já existe
    const transaction = db.transaction("fantasias", "readonly");
    const store = transaction.objectStore("fantasias");
    
    store.getAll().onsuccess = async (event) => {
        const todasAsPecas = event.target.result;
        const referenciaJaExiste = todasAsPecas.some(p => p.ref.toUpperCase() === refInformada);

        if (referenciaJaExiste) {
            alert("Uma peça já foi cadastrada com essa referência, verifique seu catálogo.");
            return;
        }

        // Se passar na validação, prossegue com o salvamento da foto e do objeto
        const fInput = document.getElementById('fotoPeca'); 
        let foto = '';
        if (fInput.files[0]) {
            foto = await new Promise(r => { 
                const rd = new FileReader(); 
                rd.onload = () => r(rd.result); 
                rd.readAsDataURL(fInput.files[0]); 
            });
        }
        
        const n = { 
            id: Date.now(), 
            ref: refInformada, 
            nome: document.getElementById('nomePeca').value, 
            categoria: categoriaSelecionada, 
            foto, 
            alugueis: [] 
        };
        
        const saveTx = db.transaction("fantasias", "readwrite");
        saveTx.objectStore("fantasias").add(n).onsuccess = () => { 
            e.target.reset(); 
            updateSelects(); 
            renderizarEstoque(); 
            alert("Peça cadastrada com sucesso!"); 
        };
    };
};
